<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>フォルダー内メール一覧</title>
  <link rel="stylesheet" href="./css/style.css">

  <!-- 戻るボタン（1回だけ） -->
  <script type="module">
    import { insertBackButton } from "./js/ui.js";
    insertBackButton();
  </script>

  <!-- Gmail処理 -->
  <script type="module" src="./js/gmail.js"></script>
</head>

<body>

  <h1 id="folderTitle"></h1>
  <p style="color:var(--ink-soft); font-size:13px;">● が付いているメールは未読です。クリックすると開いて既読になります。</p>

  <table>
    <thead>
      <tr>
        <th>企業名</th>
        <th>件名</th>
        <th>ステータス</th>
        <th>受信日時</th>
      </tr>
    </thead>
    <tbody id="folderList"></tbody>
  </table>

  <!-- フォルダー内メール読み込み -->
  <script type="module">
    import { loadFolderMails, refreshReadStatus } from "./js/gmail.js";

    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");

    document.getElementById("folderTitle").textContent = `${category} のメール`;

    // まずキャッシュで即表示 → Supabaseの最新既読状態が届いたら差し替え
    loadFolderMails(category);
    refreshReadStatus().then(() => loadFolderMails(category));
  </script>

</body>
</html>
