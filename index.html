<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>就活メール管理アプリ</title>
  <link rel="stylesheet" href="./css/style.css">

  <!-- Gmail処理・ログイン状態 -->
  <script type="module" src="./js/gmail.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    #logoutBtn { display: none; }
  </style>
</head>

<body>

  <h1>就活メール管理アプリ</h1>

  <button id="loginBtn" onclick="loginWithGoogle()">Googleでログイン</button>
  <button id="logoutBtn" onclick="logout()">ログアウト</button>
  <button onclick="manualSync()">今すぐメール同期</button>

  <div class="sync-status">
    <label class="sync-toggle">
      <input type="checkbox" id="autoSyncCheckbox">
      自動更新（5分ごとにGmailをチェック）
    </label>
    <span id="lastSyncedLabel"></span>
  </div>

  <h2>3日以内の予定お知らせ</h2>
  <div id="upcomingNotice"></div>

  <h2>フォルダー一覧</h2>
  <div class="folder-grid" id="folderGrid"></div>

  <h2>今日のメール</h2>
  <div id="todayMailList"></div>

  <script>
    window.openFolder = function(category) {
      location.href = `folder.html?category=${category}`;
    };
  </script>

  <!-- ログイン状態・自動更新・今日のメールの初期化 -->
  <script type="module">
    import { updateLoginUI } from "./js/auth.js";
    import {
      loadTodayMails, startAutoSync, stopAutoSync,
      isAutoSyncEnabled, getLastSyncedAt, syncMails, refreshReadStatus
    } from "./js/gmail.js";

    updateLoginUI();

    // 他の端末で既読にした分を先に反映してから、今日のメールを表示する
    await refreshReadStatus();
    loadTodayMails();

    function formatLastSynced() {
      const t = getLastSyncedAt();
      const label = document.getElementById("lastSyncedLabel");
      if (!t) {
        label.textContent = "（まだ同期していません）";
        return;
      }
      const d = new Date(t);
      label.textContent = `最終更新: ${d.toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })}`;
    }
    formatLastSynced();

    const checkbox = document.getElementById("autoSyncCheckbox");
    checkbox.checked = isAutoSyncEnabled();

    if (checkbox.checked) startAutoSync(5);

    checkbox.addEventListener("change", () => {
      if (checkbox.checked) {
        startAutoSync(5);
      } else {
        stopAutoSync();
      }
    });

    // 自動更新でメールが同期されたら、最終更新時刻・フォルダー件数を再描画
    window.addEventListener("mailsSynced", () => {
      formatLastSynced();
      renderFolders();
    });

    // 「今すぐメール同期」ボタン（通常通りアラートを出す）
    window.manualSync = async function () {
      await syncMails();
      formatLastSynced();
      renderFolders();
    };

    window.renderFolders = renderFolders; // フォルダー描画スクリプトから呼べるように
  </script>

  <!-- フォルダー一覧生成 -->
  <script type="module">
    import { getFolderCounts, refreshReadStatus } from "./js/gmail.js";

    // フォルダー名 → 仕分けタブの色分類
    const FOLDER_TYPES = {
      "面接案内": "interview",
      "面接日程調整": "interview",
      "説明会案内": "briefing",
      "インターン案内": "briefing",
      "座談会案内": "briefing",
      "イベント案内": "briefing",
      "選考優遇案内": "other",
      "締切案内": "deadline",
      "エントリー案内": "deadline",
      "書類選考通過": "other",
      "書類選考不通過": "other",
      "適性検査・WEBテスト": "deadline",
      "課題提出": "deadline",
      "合格・内定": "other",
      "不採用": "other",
      "要返信": "other",
      "その他": "other",
      "カレンダーを見る": "calendar"
    };

    const folders = Object.keys(FOLDER_TYPES);

    window.renderFolders = function () {
      const counts = getFolderCounts();
      const grid = document.getElementById("folderGrid");
      grid.innerHTML = "";

      folders.forEach(folder => {
        const div = document.createElement("div");
        div.className = "folder-item";
        div.dataset.type = FOLDER_TYPES[folder];

        if (folder === "カレンダーを見る") {
          div.onclick = () => location.href = "calendar.html";
          div.innerHTML = `
            <div class="folder-count"></div>
            <div>${folder}</div>
          `;
        } else {
          const info = counts[folder] || { total: 0, unread: 0 };
          const unreadLabel = info.unread > 0
            ? `<span class="unread-stamp">${info.unread}</span>`
            : "";
          div.onclick = () => openFolder(folder);
          div.innerHTML = `
            <div class="folder-count">${info.total}件${unreadLabel}</div>
            <div>${folder}</div>
          `;
        }

        grid.appendChild(div);
      });
    };

    renderFolders();
    refreshReadStatus().then(() => renderFolders());
  </script>

  <!-- 直近3日以内の予定お知らせ -->
  <script type="module">
    import { getUpcomingEvents } from "./js/calendar.js";

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderUpcoming() {
      const noticeBox = document.getElementById("upcomingNotice");
      const upcoming = getUpcomingEvents(3);

      if (upcoming.length === 0) {
        noticeBox.innerHTML = `<div class="notice-empty">3日以内の予定はありません</div>`;
        return;
      }

      noticeBox.innerHTML = "";
      upcoming.forEach(ev => {
        const d = new Date(ev.datetime);
        const dateStr = d.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
        const timeStr = d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });

        const div = document.createElement("div");
        div.className = "notice-item";
        div.innerHTML = `【${escapeHtml(ev.category)}】${dateStr} ${timeStr}〜 ${escapeHtml(ev.title)}`;
        noticeBox.appendChild(div);
      });
    }

    renderUpcoming();
    window.addEventListener("mailsSynced", renderUpcoming);
  </script>

</body>
</html>
